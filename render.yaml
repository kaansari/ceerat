databases:
  - name: ceerat-postgres
    databaseName: ceerat
    user: ceerat
    plan: basic-256mb

services:
  - type: pserv
    name: ceerat-user-service
    runtime: go
    plan: starter
    buildCommand: ./scripts/render-build-user-service.sh
    startCommand: PORT=$CEERAT_SERVICE_PORT ./bin/ceerat-user-service
    envVars:
      - key: APP_ENV
        value: production
      - key: CEERAT_ENV
        value: production
      - key: CEERAT_SERVICE_PORT
        value: "50051"
      - key: CEERAT_USER_ADMIN_PORT
        value: "8081"
      - key: DB_HOST
        fromDatabase:
          name: ceerat-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ceerat-postgres
          property: port
      - key: DB_USER
        fromDatabase:
          name: ceerat-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ceerat-postgres
          property: password
      - key: DB_NAME
        fromDatabase:
          name: ceerat-postgres
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_AUTH_ENABLED
        value: "true"
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: INITIAL_ADMIN_NAME
        sync: false
      - key: TYPESENSE_HOST
        sync: false
      - key: TYPESENSE_PORT
        sync: false
      - key: TYPESENSE_PROTOCOL
        sync: false
      - key: TYPESENSE_API_KEY
        sync: false
      - key: TYPESENSE_COLLECTION_JOBS
        value: jobs
      - key: TYPESENSE_DISABLED
        value: "false"
      - key: GREENHOUSE_JOB_BOARD_API_KEY
        sync: false
      - key: CEERAT_GREENHOUSE_JOB_BOARD_API_KEY
        sync: false

  - type: pserv
    name: ceerat-agent-service
    runtime: go
    plan: starter
    buildCommand: ./scripts/render-build-agent-service.sh
    startCommand: PORT=$CEERAT_AGENT_PORT ./bin/ceerat-agent-service
    envVars:
      - key: APP_ENV
        value: production
      - key: CEERAT_ENV
        value: production
      - key: CEERAT_AGENT_PORT
        value: "8088"
      - key: USER_SERVICE_ADDR
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: CEERAT_USER_SERVICE_ADDR
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false

  - type: web
    name: ceerat-web-ui
    runtime: go
    plan: starter
    buildCommand: ./scripts/render-build-web-ui.sh
    startCommand: CEERAT_WEB_UI_PORT=$PORT CEERAT_AGENT_BASE_URL=http://$CEERAT_AGENT_SERVICE_HOSTPORT AGENT_BASE_URL=http://$CEERAT_AGENT_SERVICE_HOSTPORT ./bin/ceerat-web-ui
    envVars:
      - key: APP_ENV
        value: production
      - key: CEERAT_ENV
        value: production
      - key: CEERAT_API_BASE_URL
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: API_BASE_URL
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: CEERAT_AGENT_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: ceerat-agent-service
          property: hostport

  - type: web
    name: ceerat-admin-ui
    runtime: go
    plan: starter
    buildCommand: ./scripts/render-build-admin-ui.sh
    startCommand: CEERAT_ADMIN_UI_PORT=$PORT CEERAT_ADMIN_API_BASE_URL=http://$CEERAT_USER_SERVICE_HOST:$CEERAT_USER_ADMIN_PORT ./bin/ceerat-admin-ui
    envVars:
      - key: APP_ENV
        value: production
      - key: CEERAT_ENV
        value: production
      - key: CEERAT_API_BASE_URL
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: API_BASE_URL
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: CEERAT_USER_SERVICE_HOST
        fromService:
          type: pserv
          name: ceerat-user-service
          property: host
      - key: CEERAT_USER_ADMIN_PORT
        fromService:
          type: pserv
          name: ceerat-user-service
          envVarKey: CEERAT_USER_ADMIN_PORT
      - key: SESSION_SECRET
        generateValue: true

  - type: web
    name: ceerat-customer-ui
    runtime: go
    plan: starter
    buildCommand: ./scripts/render-build-customer-ui.sh
    startCommand: CEERAT_CUSTOMER_UI_PORT=$PORT CEERAT_AGENT_BASE_URL=http://$CEERAT_AGENT_SERVICE_HOSTPORT AGENT_BASE_URL=http://$CEERAT_AGENT_SERVICE_HOSTPORT ./bin/ceerat-customer-ui
    envVars:
      - key: APP_ENV
        value: production
      - key: CEERAT_ENV
        value: production
      - key: CEERAT_API_BASE_URL
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: API_BASE_URL
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: CEERAT_AGENT_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: ceerat-agent-service
          property: hostport
      - key: SESSION_SECRET
        generateValue: true

  - type: cron
    name: ceerat-ats-crawler
    runtime: go
    schedule: "*/30 * * * *"
    buildCommand: ./scripts/render-build-ats-crawler.sh
    startCommand: ./bin/ceerat-ats-crawler -greenhouse-config=atscrawler/config/greenhouse-companies.csv -import -ceerat-service-addr=$CEERAT_SERVICE_ADDR
    envVars:
      - key: APP_ENV
        value: production
      - key: CEERAT_ENV
        value: production
      - key: CEERAT_SERVICE_ADDR
        fromService:
          type: pserv
          name: ceerat-user-service
          property: hostport
      - key: CEERAT_AGENT_TOKEN
        sync: false
      - key: CEERAT_AGENT_EMAIL
        sync: false
      - key: CEERAT_AGENT_PASSWORD
        sync: false
